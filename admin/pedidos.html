<html lang="es">
<head>

    <title>Pedidos | Rhema Diseños</title>
    <link rel="icon" href="../assets/emmagina-logo.svg">
    <link rel="stylesheet" href="css/admin.css?v=5.17.1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="css/admin-experience-v327.css?v=5.17.1">
    <link rel="stylesheet" href="css/admin-orders-pro-v3450.css?v=5.17.1">
</head>
<body data-admin-page="pedidos" data-admin-title="Pedidos">
    <section id="admin-page-content">

<div class="admin-page-intro">
    <div>
        <h2>Gestión de pedidos</h2>
        <p>Controla pedidos, pagos, personalizaciones, diseño, fabricación y entrega desde una vista operativa.</p>
    </div>

    <div class="orders-page-actions">
        <a class="admin-button secondary" href="../seguimiento-pedido.html" target="_blank" rel="noopener">
            <i class="fa-solid fa-route"></i>
            Ver seguimiento cliente
        </a>

        <button class="admin-button secondary" id="orders-refresh" type="button">
        <i class="fa-solid fa-rotate"></i>
        Actualizar
        </button>
    </div>
</div>

<div class="admin-toolbar">
    <div class="admin-toolbar-group" style="flex:1">
        <div class="admin-field" style="min-width:min(100%,320px);flex:1">
            <input id="orders-search" type="search" placeholder="Buscar por pedido, cliente o correo">
        </div>

        <select id="orders-status" aria-label="Filtrar por estado" style="min-height:43px;border:1px solid var(--admin-border);border-radius:11px;padding:0 12px">
            <option value="">Todos los estados</option>
            <option value="pendiente">Pendiente</option>
            <option value="confirmado">Confirmado</option>
            <option value="validacion_diseno">Validación de diseño</option>
            <option value="en_produccion">En producción</option>
            <option value="listo">Listo</option>
            <option value="enviado">Enviado</option>
            <option value="entregado">Entregado</option>
            <option value="cancelado">Cancelado</option>
        </select>
    </div>
</div>

<section class="admin-card">
    <div class="admin-table-wrap" id="orders-table"></div>
</section>

<div class="admin-modal" id="order-modal" hidden>
    <section class="admin-modal-panel">
        <header class="admin-modal-header">
            <h3 id="order-modal-title">Detalle del pedido</h3>
            <button class="admin-icon-button" type="button" data-close-modal="order-modal" aria-label="Cerrar">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </header>

        <div class="admin-modal-body" id="order-detail"></div>

        <footer class="admin-modal-footer">
            <button class="admin-button secondary" type="button" data-close-modal="order-modal">
                Cerrar
            </button>

            <button class="admin-button secondary" id="order-sync-payment" type="button" hidden>
                <i class="fa-solid fa-rotate"></i>
                Sincronizar Mercado Pago
            </button>

            <button class="admin-button" id="order-save" type="button">
                <i class="fa-solid fa-floppy-disk"></i>
                Guardar cambios
            </button>
        </footer>
    </section>
</div>

    </section>

    <script src="../js/config.js?v=5.17.1"></script>
    <script src="js/admin-api.js?v=5.17.1"></script>
    <script src="js/admin-common.js?v=5.17.1"></script>
    <script src="js/admin-experience-v327.js?v=5.17.1"></script>
    <script src="js/orders-admin.js?v=5.17.1"></script>
    <script src="js/orders-admin-pro-v3450.js?v=5.17.1"></script>
</body>
</html>
