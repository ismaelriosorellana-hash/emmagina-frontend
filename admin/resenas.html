<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <title>Reseñas | Rhema Diseños</title>
  <link rel="icon" href="../assets/emmagina-logo.svg">
  <link rel="stylesheet" href="css/admin.css?v=5.24.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="css/admin-experience-v327.css?v=5.24.0">
  <link rel="stylesheet" href="css/reviews-admin.css?v=5.24.0">
</head>
<body data-admin-page="resenas" data-admin-title="Reseñas">
<section id="admin-page-content">
  <div class="admin-page-intro"><div><h2>Reseñas de productos</h2><p>Crea, modera y publica opiniones reales para fortalecer la confianza en la tienda.</p></div><button class="admin-button" id="review-new" type="button"><i class="fa-solid fa-plus"></i> Nueva reseña</button></div>
  <div class="admin-toolbar"><select id="review-status" class="admin-filter-select" aria-label="Estado"><option value="">Todos los estados</option><option value="pendiente">Pendientes</option><option value="aprobada">Aprobadas</option><option value="oculta">Ocultas</option></select><button class="admin-button secondary" id="review-refresh" type="button"><i class="fa-solid fa-rotate"></i> Actualizar</button></div>
  <section class="admin-card"><div id="reviews-summary" class="reviews-summary"></div><div id="reviews-list" class="reviews-list"></div></section>
  <div class="admin-modal" id="review-modal" hidden><section class="admin-modal-panel reviews-modal-panel"><header class="admin-modal-header"><div><h3 id="review-modal-title">Nueva reseña</h3><p>Las reseñas aprobadas aparecerán inmediatamente en la ficha del producto.</p></div><button class="admin-icon-button" type="button" data-close-modal="review-modal" aria-label="Cerrar"><i class="fa-solid fa-xmark"></i></button></header>
  <form id="review-form"><input type="hidden" id="review-id"><div class="admin-form-grid">
    <div class="admin-field full"><label for="review-product">Producto</label><select id="review-product" required></select></div>
    <div class="admin-field"><label for="review-name">Nombre del cliente</label><input id="review-name" maxlength="120" required></div>
    <div class="admin-field"><label for="review-email">Correo, opcional</label><input id="review-email" type="email" maxlength="180"></div>
    <div class="admin-field"><label for="review-stars">Valoración</label><select id="review-stars"><option value="5">5 estrellas</option><option value="4">4 estrellas</option><option value="3">3 estrellas</option><option value="2">2 estrellas</option><option value="1">1 estrella</option></select></div>
    <div class="admin-field"><label for="review-state">Estado</label><select id="review-state"><option value="pendiente">Pendiente</option><option value="aprobada">Aprobada</option><option value="oculta">Oculta</option></select></div>
    <div class="admin-field full"><label for="review-title">Título, opcional</label><input id="review-title" maxlength="120"></div>
    <div class="admin-field full"><label for="review-comment">Comentario</label><textarea id="review-comment" rows="6" maxlength="1500" required></textarea></div>
    <label class="admin-checkbox"><input id="review-verified" type="checkbox"> Compra verificada</label>
    <label class="admin-checkbox"><input id="review-featured" type="checkbox"> Destacar reseña</label>
  </div><footer class="admin-modal-footer"><button class="admin-button secondary" type="button" data-close-modal="review-modal">Cancelar</button><button class="admin-button" type="submit"><i class="fa-solid fa-floppy-disk"></i> Guardar reseña</button></footer></form></section></div>
</section>
<script src="../js/config.js?v=5.24.0"></script><script src="js/admin-api.js?v=5.24.0"></script><script src="js/admin-common.js?v=5.24.0"></script><script src="js/admin-experience-v327.js?v=5.24.0"></script><script src="js/reviews-admin.js?v=5.24.0"></script>
</body></html>
