<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; form-action 'self'; script-src 'self' https://www.googletagmanager.com https://www.clarity.ms https://*.clarity.ms; script-src-attr 'none'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' data: https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: blob: https: https://www.google-analytics.com https://www.googletagmanager.com https://*.clarity.ms; connect-src 'self' https://emmagina-backend.onrender.com https://res.cloudinary.com https://*.cloudinary.com https://www.google-analytics.com https://analytics.google.com https://www.googletagmanager.com https://www.clarity.ms https://*.clarity.ms; media-src 'self' blob:; worker-src 'self' blob:; manifest-src 'self'; upgrade-insecure-requests">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Solicitudes | Rhema Diseños</title>
    <link rel="icon" href="../assets/emmagina-logo.svg">
    <link rel="stylesheet" href="css/admin.css?v=5.28.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="css/admin-experience-v327.css?v=5.28.0">
</head>
<body data-admin-page="solicitudes" data-admin-title="Solicitudes personalizadas">
    <section id="admin-page-content">
        <div class="admin-page-intro">
            <div>
                <h2>Solicitudes de impresión y figuras</h2>
                <p>Revisa cotizaciones recibidas desde Crea tu Figura y Servicio 3D a Pedido.</p>
            </div>
            <button class="admin-button secondary" id="requests-refresh" type="button">
                <i class="fa-solid fa-rotate"></i>
                Actualizar
            </button>
        </div>

        <div class="admin-toolbar">
            <div class="admin-toolbar-group">
                <div class="admin-field">
                    <input id="requests-search" type="search" placeholder="Buscar por folio, cliente, WhatsApp o descripción">
                </div>
                <select id="requests-status" class="admin-filter-select" aria-label="Filtrar por estado">
                    <option value="">Todos los estados</option>
                    <option value="recibida">Recibidas</option>
                    <option value="en_revision">En revisión</option>
                    <option value="cotizada">Cotizadas</option>
                    <option value="aceptada">Aceptadas</option>
                    <option value="rechazada">Rechazadas</option>
                    <option value="cerrada">Cerradas</option>
                </select>
                <select id="requests-type" class="admin-filter-select" aria-label="Filtrar por tipo">
                    <option value="">Todos los tipos</option>
                    <option value="figura">Figura / retrato 3D</option>
                    <option value="servicio">Impresión a pedido</option>
                    <option value="idea">Idea personalizada</option>
                </select>
            </div>
        </div>

        <section class="admin-card">
            <div class="admin-table-wrap" id="requests-table"></div>
        </section>

        <div class="admin-modal" id="request-modal" hidden>
            <section class="admin-modal-panel">
                <header class="admin-modal-header">
                    <div>
                        <h3 id="request-modal-title">Solicitud</h3>
                        <p id="request-modal-subtitle">Detalle de cotización recibida.</p>
                    </div>
                    <button class="admin-icon-button" type="button" data-close-modal="request-modal" aria-label="Cerrar">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </header>
                <div class="admin-modal-body" id="request-detail"></div>
            </section>
        </div>
    </section>

    <script src="../js/config.js?v=5.28.0"></script>
    <script src="js/admin-api.js?v=5.28.0"></script>
    <script src="js/admin-common.js?v=5.28.0"></script>
    <script src="js/solicitudes-admin.js?v=5.28.0"></script>
</body>
</html>
